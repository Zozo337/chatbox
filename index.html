<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zozo AI ChatBox</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --b:#e5e7eb; --t:#111827; --mut:#6b7280; --bg:#f9fafb; --primary:#2563eb; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--t); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { background:#fff; border:1px solid var(--b); border-radius:16px; box-shadow: 0 4px 12px rgba(0,0,0,.05); overflow: hidden; }
    
    /* Header: 標題與登入/登出按鈕區 */
    .top { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--b); }
    .title { font-size:18px; font-weight:800; }
    .auth-zone { display: flex; align-items: center; gap: 10px; }
    
    /* 狀態欄：Email 與 Badge */
    .status-bar { padding: 12px 20px; background: #fff; display:flex; gap:10px; align-items:center; flex-wrap:wrap; border-bottom:1px solid var(--b); }
    #userEmail { font-size: 13px; color: var(--mut); font-weight: 500; }
    
    .badge { font-size:12px; border:1px solid var(--b); padding:4px 10px; border-radius:999px; font-weight: 600; }
    .badge.ok { border-color:#86efac; background:#f0fdf4; color:#166534; }
    .badge.no { border-color:#fecaca; background:#fef2f2; color:#991b1b; }
    .badge.wait { border-color:#d1d5db; background:#f3f4f6; color:#4b5563; }

    /* 對話區域 */
    #chat { height: 480px; overflow-y:auto; padding: 20px; background: #fff; }
    .row { display:flex; margin-bottom: 12px; }
    .bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; line-height:1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .me { justify-content:flex-end; }
    .me .bubble { background: var(--t); color:#fff; border-bottom-right-radius: 4px; }
    .ai { justify-content:flex-start; }
    .ai .bubble { background:#f3f4f6; color: var(--t); border-bottom-left-radius: 4px; }

    /* 輸入區 */
    .composer { padding: 16px 20px; display:flex; gap:10px; align-items:flex-end; }
    textarea { flex:1; min-height: 44px; max-height: 120px; resize: none; padding: 10px 14px; border-radius: 10px; border:1px solid var(--b); font-size: 14px; outline:none; }
    textarea:disabled { background:#f9fafb; cursor: not-allowed; }
    
    button { padding: 0 16px; height: 36px; border-radius: 8px; border:none; cursor:pointer; font-weight:700; transition: 0.2s; }
    .btn-primary { background: var(--primary); color:#fff; height: 44px; }
    .btn-danger { background: var(--danger); color:#fff; }
    button:disabled { opacity: 0.5; cursor:not-allowed; }

    .hint { padding: 0 20px 16px; color: var(--mut); font-size: 11px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="title">Zozo AI ChatBox</div>
        <div class="auth-zone">
          <div id="signinBtn"></div>
          <button id="logoutBtn" class="btn-danger" style="display: none;" onclick="handleLogout()">登出</button>
        </div>
      </div>

      <div class="status-bar">
        <span id="userEmail">尚未登入 Google</span>
        <span id="agentBadge" class="badge wait">agent：未知</span>
      </div>

      <div id="chat">
        <div class="row ai"><div class="bubble">請先登入 Google 以開始對話。</div></div>
      </div>

      <div class="composer">
        <textarea id="userInput" placeholder="輸入訊息…" disabled></textarea>
        <button id="sendBtn" class="btn-primary" disabled>送出</button>
      </div>
      <div class="hint">💡 提示：若 agent 為無權限，系統僅會陪聊，不會執行自動化流程。</div>
    </div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = "321508868274-c4j4s7c91j4vvbg39a59kcck99nginhv.apps.googleusercontent.com";
    const API_BASE = "https://zozochatbox.duckdns.org"; 
    const STORAGE_KEY = "zozo_id_token"; // 用於持久化儲存

    // ✅ 新增：stream_id（用來對應 Anycross callback / 前端輪詢）
    const STREAM_KEY = "zozo_stream_id";
    let streamId = null;

    function genStreamId() {
      return `s_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;
    }
    function initStreamId() {
      const saved = localStorage.getItem(STREAM_KEY);
      if (saved) return saved;
      const id = genStreamId();
      localStorage.setItem(STREAM_KEY, id);
      return id;
    }

    let googleIdToken = null;
    let isSending = false;

    // DOM 元素
    const chatBox = document.getElementById("chat");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const userEmailText = document.getElementById("userEmail");
    const agentBadge = document.getElementById("agentBadge");
    const logoutBtn = document.getElementById("logoutBtn");
    const signinBtnDiv = document.getElementById("signinBtn");

    // JWT 解析
    function decodeJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      } catch (e) { return {}; }
    }

    // 介面切換邏輯
    function updateAuthUI(isLoggedIn, email = "") {
      if (isLoggedIn) {
        signinBtnDiv.style.display = "none";
        logoutBtn.style.display = "block";
        userInput.disabled = false;
        sendBtn.disabled = false;
        userEmailText.textContent = `已登入：${email}`;
      } else {
        signinBtnDiv.style.display = "block";
        logoutBtn.style.display = "none";
        userInput.disabled = true;
        sendBtn.disabled = true;
        userEmailText.textContent = "尚未登入 Google";
        agentBadge.className = "badge wait";
        agentBadge.textContent = "agent：未知";
        googleIdToken = null;
      }
    }

    // 登出
    function handleLogout() {
      localStorage.removeItem(STORAGE_KEY);

      // ✅ 建議：登出就換新 stream_id（避免舊輪詢串到新登入）
      localStorage.removeItem(STREAM_KEY);
      streamId = initStreamId();

      updateAuthUI(false);
      append("ai", "您已登出，對話已結束。");
    }

    function append(role, text) {
      const row = document.createElement("div");
      row.className = `row ${role === "me" ? "me" : "ai"}`;
      row.innerHTML = `<div class="bubble"></div>`;
      const bubble = row.querySelector('.bubble');
      bubble.textContent = text; // ✅ 防止注入
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
      return bubble;
    }

    // ✅ 新增：輪詢 Anycross callback 結果（你後端已做 /agent/result）
    async function pollAgentResult(requestId, maxMs = 120000) {
      const start = Date.now();
      while (Date.now() - start < maxMs) {
        try {
          const r = await fetch(`${API_BASE}/agent/result?request_id=${encodeURIComponent(requestId)}`, {
            method: "GET",
            headers: { "Accept": "application/json" }
          });
          const data = await r.json();

          if (data && data.status && data.status !== "pending") {
            return data; // success / failed / unknown
          }
        } catch (e) {
          // 忽略，繼續輪詢
        }
        await new Promise(res => setTimeout(res, 1500));
      }
      return { status: "pending", request_id: requestId, message: "timeout" };
    }

    function formatAgentRecord(rec) {
      const status = (rec.status || "").toLowerCase();
      const ok = status === "success";
      const intent = rec.intent || "unknown";
      const msg = rec.message || "";

      const r = rec.result || {};
      const lines = [];
      lines.push(`📌 作業結果：${ok ? "✅ 成功" : "❌ 失敗"}（${intent}）`);
      if (r.name) lines.push(`姓名：${r.name}`);
      if (r.email) lines.push(`Email：${r.email}`);
      if (r.department) lines.push(`部門：${r.department}`);
      if (r.position) lines.push(`職位：${r.position}`);
      if (r.country) lines.push(`國家地區：${r.country}`);
      if (r.supervisor) lines.push(`上級：${r.supervisor}`);
      if (r.start_date) lines.push(`入職日期：${r.start_date}`);
      if (r.new_name) lines.push(`新姓名：${r.new_name}`);
      if (r.new_supervisor) lines.push(`新主管：${r.new_supervisor}`);
      if (msg) lines.push(`原因/訊息：${msg}`);

      return lines.join("\n");
    }

    async function handleRequestIds(requestIds) {
      if (!Array.isArray(requestIds) || requestIds.length === 0) return;
      // 多筆就逐筆輪詢並回報
      for (const rid of requestIds) {
        if (!rid) continue;
        const rec = await pollAgentResult(rid);
        if (rec.status === "pending") {
          append("ai", `⏳ 仍在處理中：${rid}`);
        } else {
          append("ai", formatAgentRecord(rec));
        }
      }
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !googleIdToken || isSending) return;

      userInput.value = "";
      append("me", text);
      isSending = true;
      const loading = append("ai", "思考中…");

      try {
        const res = await fetch(`${API_BASE}/parse`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${googleIdToken}`
          },
          // ✅ 不改你原本結構，只多帶 stream_id
          body: JSON.stringify({ text, stream_id: streamId })
        });
        const data = await res.json();
        
        // 更新 Agent 權限標籤
        if (typeof data.agent_allowed === "boolean") {
          agentBadge.className = `badge ${data.agent_allowed ? 'ok' : 'no'}`;
          agentBadge.textContent = `agent：${data.agent_allowed ? '有權限' : '無權限'}`;
        }

        loading.textContent = data.reply || "（無回傳內容）";

        // ✅ 新增：如果後端有回 request_ids，就開始輪詢 /agent/result
        if (data && Array.isArray(data.request_ids) && data.request_ids.length > 0) {
          handleRequestIds(data.request_ids);
        }

      } catch (err) {
        loading.textContent = "（連線失敗）請檢查後端服務是否開啟。";
      } finally {
        isSending = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", (e) => { 
      if(e.key === "Enter" && !e.shiftKey){ 
        e.preventDefault(); 
        sendMessage(); 
      }
    });

    window.onload = () => {
      // ✅ 初始化 stream_id（每次載入都保留同一個，登出才刷新）
      streamId = initStreamId();

      // 1. 初始化 Google 登入
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: (resp) => {
          googleIdToken = resp.credential;
          localStorage.setItem(STORAGE_KEY, googleIdToken);
          const email = decodeJwt(googleIdToken).email;
          updateAuthUI(true, email);
          append("ai", "驗證成功，歡迎使用！");
        }
      });

      // 2. 渲染按鈕
      google.accounts.id.renderButton(signinBtnDiv, { theme: "outline", size: "large" });

      // 3. 檢查 LocalStorage 是否有舊 Token (解決重整就登出的問題)
      const savedToken = localStorage.getItem(STORAGE_KEY);
      if (savedToken) {
        const profile = decodeJwt(savedToken);
        // 檢查 Token 是否過期 (exp 是秒)
        if (profile.exp * 1000 > Date.now()) {
          googleIdToken = savedToken;
          updateAuthUI(true, profile.email);
          append("ai", "歡迎回來！登入狀態已自動恢復。");
        } else {
          localStorage.removeItem(STORAGE_KEY);
        }
      }
    };
  </script>
</body>
</html>
