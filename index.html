<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zozo AI Chat</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root { --b:#e5e7eb; --t:#111827; --mut:#6b7280; --bg:#f9fafb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI"; background: var(--bg); color: var(--t); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { background:#fff; border:1px solid var(--b); border-radius:16px; box-shadow: 0 2px 10px rgba(0,0,0,.04); }
    .top { padding:16px 16px 0 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .title { font-size:18px; font-weight:800; letter-spacing:.2px; }
    .sub { font-size:12px; color: var(--mut); margin-top:4px; }

    .user { padding: 0 16px 12px 16px; color: var(--mut); font-size: 13px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .badge { font-size:12px; border:1px solid var(--b); padding:4px 10px; border-radius:999px; background:#fff; }
    .badge.ok { border-color:#86efac; background:#f0fdf4; color:#166534; }
    .badge.no { border-color:#fecaca; background:#fef2f2; color:#991b1b; }

    #chat { height: 520px; overflow:auto; padding: 12px 16px 16px 16px; border-top:1px solid var(--b); border-bottom:1px solid var(--b); }
    .row { display:flex; margin: 10px 0; }
    .bubble { max-width: 78%; padding: 10px 12px; border-radius: 14px; border:1px solid var(--b); line-height:1.45; white-space: pre-wrap; word-break: break-word; }
    .me { justify-content:flex-end; }
    .me .bubble { background:#111827; color:#fff; border-color:#111827; }
    .ai { justify-content:flex-start; }
    .ai .bubble { background:#fff; color:#111827; }

    .composer { padding: 12px 16px; display:flex; gap:10px; align-items:flex-end; }
    textarea { flex:1; min-height: 46px; max-height: 160px; resize: vertical; padding: 10px 12px; border-radius: 12px; border:1px solid var(--b); font-size: 14px; outline:none; }
    textarea:disabled { background:#f3f4f6; }
    button { padding: 10px 14px; border-radius: 12px; border:1px solid var(--b); background:#fff; cursor:pointer; font-weight:700; }
    button.primary { background:#2563eb; color:#fff; border-color:#2563eb; }
    button:disabled { opacity:.6; cursor:not-allowed; }

    .hint { padding: 0 16px 14px 16px; color: var(--mut); font-size: 12px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="title">Zozo AI ChatBox</div>
        </div>
        <div id="signin"></div>
      </div>

      <!-- ✅ 只保留：登入資訊 + agent 權限 -->
      <div class="user">
        <span id="userText">尚未登入</span>
        <span id="agentBadge" class="badge no">agent：未知</span>
      </div>

      <div id="chat">
        <div class="row ai"><div class="bubble">先登入 Google，然後你就可以開始對話。</div></div>
      </div>

      <div class="composer">
        <textarea id="input" placeholder="輸入訊息…（Enter 送出 / Shift+Enter 換行）" disabled></textarea>
        <button id="send" class="primary" disabled>送出</button>
      </div>

      <div class="hint">
        小提醒：如果你看到 agent = 無權限，代表你的 email 不在 allowlist，系統只會聊天不做動（安全設計）。
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = "321508868274-c4j4s7c91j4vvbg39a59kcck99nginhv.apps.googleusercontent.com";
    const API_BASE = "https://zozochatbox.duckdns.org";

    let googleIdToken = null;
    let isSending = false;

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const userText = document.getElementById("userText");
    const agentBadge = document.getElementById("agentBadge");

    function append(role, text) {
      const row = document.createElement("div");
      row.className = "row " + (role === "me" ? "me" : "ai");
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function setAgentBadge(agentAllowed) {
      if (agentAllowed === true) {
        agentBadge.className = "badge ok";
        agentBadge.textContent = "agent：有權限";
      } else if (agentAllowed === false) {
        agentBadge.className = "badge no";
        agentBadge.textContent = "agent：無權限";
      } else {
        agentBadge.className = "badge no";
        agentBadge.textContent = "agent：未知";
      }
    }

    function setSending(v) {
      isSending = v;
      input.disabled = !googleIdToken || v;
      sendBtn.disabled = !googleIdToken || v;
      sendBtn.textContent = v ? "送出中…" : "送出";
    }

    // ✅ 前端解 JWT（只用來顯示 email，不做安全判斷）
    function decodeJwtPayload(jwt) {
      try {
        const b64 = jwt.split(".")[1];
        const b64url = b64.replace(/-/g, "+").replace(/_/g, "/");
        const json = decodeURIComponent(atob(b64url).split("").map(c =>
          "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(""));
        return JSON.parse(json);
      } catch {
        return {};
      }
    }

    async function sendMessage() {
      const msg = input.value.trim();
      if (!msg || !googleIdToken || isSending) return;

      input.value = "";
      append("me", msg);
      setSending(true);

      const loadingRow = document.createElement("div");
      loadingRow.className = "row ai";
      const loadingBubble = document.createElement("div");
      loadingBubble.className = "bubble";
      loadingBubble.textContent = "思考中…";
      loadingRow.appendChild(loadingBubble);
      chat.appendChild(loadingRow);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch(`${API_BASE}/parse`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${googleIdToken}`,
          },
          body: JSON.stringify({ text: msg }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          loadingBubble.textContent = "（錯誤）" + (data.error || JSON.stringify(data) || "unknown");
          return;
        }

        // ✅ 後端驗證後回傳的 email / agent_allowed（以後端為準）
        if (data.authed_email) userText.textContent = "已登入：" + data.authed_email;
        if (typeof data.agent_allowed === "boolean") setAgentBadge(data.agent_allowed);

        loadingBubble.textContent = data.reply || "（沒有回傳 reply）";
      } catch (err) {
        loadingBubble.textContent = "（連線失敗）" + err.message;
      } finally {
        setSending(false);
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    window.onload = function () {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: (resp) => {
          googleIdToken = resp.credential;

          // ✅ 立刻顯示 email（更像產品，不顯示 token）
          const payload = decodeJwtPayload(googleIdToken);
          const email = payload.email || "（已登入）";
          userText.textContent = "已登入：" + email;

          // agent 先未知，等第一次打後端再更新成有/無權限
          setAgentBadge(null);

          input.disabled = false;
          sendBtn.disabled = false;
          append("ai", "登入完成！可以開始對話了。");
        },
      });

      google.accounts.id.renderButton(
        document.getElementById("signin"),
        { theme: "outline", size: "large", text: "signin_with" }
      );
    };
  </script>
</body>
</html>
