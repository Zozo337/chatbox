<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zozo AI ChatBox</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --b:#e5e7eb; --t:#111827; --mut:#6b7280; --bg:#f9fafb; --primary:#2563eb; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--t); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    .card { background:#fff; border:1px solid var(--b); border-radius:16px; box-shadow: 0 4px 12px rgba(0,0,0,.05); overflow: hidden; }
    
    .top { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--b); }
    .title { font-size:18px; font-weight:800; }
    
    .status-bar { padding: 12px 20px; background: #fff; display:flex; gap:10px; align-items:center; flex-wrap:wrap; border-bottom:1px solid var(--b); }
    #userEmail { font-size: 13px; color: var(--mut); font-weight: 500; }
    
    .badge { font-size:12px; border:1px solid var(--b); padding:4px 10px; border-radius:999px; font-weight: 600; }
    .badge.ok { border-color:#86efac; background:#f0fdf4; color:#166534; }
    .badge.no { border-color:#fecaca; background:#fef2f2; color:#991b1b; }
    .badge.wait { border-color:#d1d5db; background:#f3f4f6; color:#4b5563; }

    #chat { height: 480px; overflow-y:auto; padding: 20px; background: #fff; }
    .row { display:flex; margin-bottom: 12px; }
    .bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; line-height:1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .me { justify-content:flex-end; }
    .me .bubble { background: var(--t); color:#fff; border-bottom-right-radius: 4px; }
    .ai { justify-content:flex-start; }
    .ai .bubble { background:#f3f4f6; color: var(--t); border-bottom-left-radius: 4px; }

    .composer { padding: 16px 20px; display:flex; gap:10px; align-items:flex-end; }
    textarea { flex:1; min-height: 44px; max-height: 120px; resize: none; padding: 10px 14px; border-radius: 10px; border:1px solid var(--b); font-size: 14px; outline:none; }
    textarea:disabled { background:#f9fafb; cursor: not-allowed; }
    
    button { padding: 0 16px; height: 44px; border-radius: 10px; border:none; cursor:pointer; font-weight:700; transition: opacity 0.2s; }
    .btn-primary { background: var(--primary); color:#fff; }
    .btn-outline { background:#fff; border:1px solid var(--b); color: var(--t); }
    .btn-danger { background: var(--danger); color:#fff; font-size: 12px; height: 32px; padding: 0 10px; }
    button:disabled { opacity: 0.5; cursor:not-allowed; }

    .hint { padding: 0 20px 16px; color: var(--mut); font-size: 11px; }
    #logoutBtn { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="title">Zozo AI ChatBox</div>
        <div id="signinBtn"></div>
        <button id="logoutBtn" class="btn-danger" onclick="handleLogout()">登出</button>
      </div>

      <div class="status-bar">
        <span id="userEmail">尚未登入 Google</span>
        <span id="agentBadge" class="badge wait">agent：未知</span>
      </div>

      <div id="chat">
        <div class="row ai"><div class="bubble">請先登入以開始對話。</div></div>
      </div>

      <div class="composer">
        <textarea id="userInput" placeholder="輸入訊息…" disabled></textarea>
        <button id="sendBtn" class="btn-primary" disabled>送出</button>
      </div>
      <div class="hint">提醒：若 agent 無權限，代表 Email 不在白名單中，系統僅會聊天不會執行流程。</div>
    </div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = "321508868274-c4j4s7c91j4vvbg39a59kcck99nginhv.apps.googleusercontent.com";
    const API_BASE = "https://zozochatbox.duckdns.org"; // 請確保與後端對接位址正確
    const STORAGE_KEY = "zozo_token";

    let googleIdToken = null;
    let isSending = false;

    const chatBox = document.getElementById("chat");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const userEmailText = document.getElementById("userEmail");
    const agentBadge = document.getElementById("agentBadge");
    const logoutBtn = document.getElementById("logoutBtn");
    const signinBtnDiv = document.getElementById("signinBtn");

    function decodeJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      } catch (e) { return {}; }
    }

    function append(role, text) {
      const row = document.createElement("div");
      row.className = `row ${role === "me" ? "me" : "ai"}`;
      row.innerHTML = `<div class="bubble">${text}</div>`;
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
      return row.querySelector('.bubble');
    }

    function setUI(isLoggedIn, email = "") {
      googleIdToken = isLoggedIn ? localStorage.getItem(STORAGE_KEY) : null;
      userInput.disabled = !isLoggedIn;
      sendBtn.disabled = !isLoggedIn;
      logoutBtn.style.display = isLoggedIn ? "block" : "none";
      signinBtnDiv.style.display = isLoggedIn ? "none" : "block";
      userEmailText.textContent = isLoggedIn ? `已登入：${email}` : "尚未登入 Google";
      if (!isLoggedIn) {
        agentBadge.className = "badge wait";
        agentBadge.textContent = "agent：未知";
      }
    }

    function handleLogout() {
      localStorage.removeItem(STORAGE_KEY);
      setUI(false);
      append("ai", "您已登出。");
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || !googleIdToken || isSending) return;

      userInput.value = "";
      append("me", text);
      isSending = true;
      const loading = append("ai", "思考中…");

      try {
        const res = await fetch(`${API_BASE}/parse`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${googleIdToken}`
          },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        
        if (typeof data.agent_allowed === "boolean") {
          agentBadge.className = `badge ${data.agent_allowed ? 'ok' : 'no'}`;
          agentBadge.textContent = `agent：${data.agent_allowed ? '有權限' : '無權限'}`;
        }
        loading.textContent = data.reply || "（無回傳內容）";
      } catch (err) {
        loading.textContent = "（連線失敗）" + err.message;
      } finally {
        isSending = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", (e) => { if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); }});

    window.onload = () => {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: (resp) => {
          localStorage.setItem(STORAGE_KEY, resp.credential);
          const email = decodeJwt(resp.credential).email;
          setUI(true, email);
          append("ai", "登入成功！");
        }
      });

      google.accounts.id.renderButton(signinBtnDiv, { theme: "outline", size: "large" });

      // 自動恢復登入
      const savedToken = localStorage.getItem(STORAGE_KEY);
      if (savedToken) {
        const profile = decodeJwt(savedToken);
        // 檢查 token 是否過期 (exp)
        if (profile.exp * 1000 > Date.now()) {
          googleIdToken = savedToken;
          setUI(true, profile.email);
          append("ai", "歡迎回來，登入狀態已恢復。");
        } else {
          localStorage.removeItem(STORAGE_KEY);
        }
      }
    };
  </script>
</body>
</html>
